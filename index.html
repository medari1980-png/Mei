<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Filma Shqip HD</title>
  <style>
    body { margin:0; background:black; }
    video { width:100%; height:100vh; object-fit:cover; }
    #logo {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 120px;
    }
  </style>
</head>
<body>

<img id="logo" src="https://i.imgur.com/yourlogo.png">

<video id="player" autoplay muted></video>

<script>
const films = [
  "https://archive.org/download/agimet-e-stines-se-madhe-1981-komplet-yt/Agimet%20e%20Stin%C3%ABs%20s%C3%AB%20madhe%20%281981%29%20komplet.mp4",
  "https://archive.org/serve/asgje-nuk-harrohet-1985/Asgj%C3%AB%20nuk%20harrohet%20%281985%29%20EDIT.mp4",
  "https://archive.org/serve/dhe-vjen-nje-dite-1986/Dhe%20vjen%20nj%C3%AB%20dit%C3%AB%20%281986%29%20EDIT.mp4"
];

let i = 0;
const player = document.getElementById("player");

function playFilm() {
  player.src = films[i];
  player.play();
}

player.addEventListener("ended", () => {
  i = (i + 1) % films.length;
  playFilm();
});

playFilm();
</script>

</body>
</html>
